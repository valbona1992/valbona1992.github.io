<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sabr & Sips — Patience in Every Sip</title>
  <meta name="description" content="A pop-up cafe bringing people together over premium matcha, artisanal coffee, refreshing mocktails, and curated plant-based bites. Based in Chicago, IL." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #F7F3EE;
      --wine: #4A1C2C;
      --terracotta: #C8553D;
      --white: #FFFFFF;
      --muted: #7A6B5F;
      --body: #5A4D44;
      --footer: #2C1810;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      letter-spacing: 0.01em;
      background-color: var(--cream);
      color: var(--body);
      line-height: 1.75;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400;
    }

    img { display: block; max-width: 100%; }
    a { text-decoration: none; }

    /* ─── Nav ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      transition: background-color 0.3s ease, backdrop-filter 0.3s ease;
    }
    nav.scrolled {
      background-color: rgba(247, 243, 238, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.25rem;
      color: var(--wine);
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-link {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--wine);
      transition: color 0.3s ease;
    }
    .nav-link:hover { color: var(--terracotta); }
    .nav-link-btn {
      border: 1px solid var(--wine);
      padding: 10px 28px;
    }
    .nav-link-btn:hover {
      background-color: var(--wine);
      color: var(--cream) !important;
    }
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      width: 28px;
      height: 28px;
    }
    .hamburger span {
      display: block;
      width: 20px;
      height: 1.5px;
      background-color: var(--wine);
      transition: transform 0.3s ease;
    }
    .mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99;
      background-color: var(--cream);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }
    .mobile-overlay.open { display: flex; }
    .mobile-nav-link {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2rem;
      color: var(--wine);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.5s ease forwards;
    }
    .mobile-nav-link:nth-child(1) { animation-delay: 0.1s; }
    .mobile-nav-link:nth-child(2) { animation-delay: 0.2s; }
    .mobile-nav-link:nth-child(3) { animation-delay: 0.3s; }
    .mobile-nav-link:nth-child(4) { animation-delay: 0.4s; }
    .mobile-nav-link.btn-style {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--wine);
      padding: 14px 36px;
      margin-top: 16px;
      animation-delay: 0.5s;
    }

    /* ─── Hero ─── */
    #hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(44, 24, 16, 0.55) 0%,
        rgba(44, 24, 16, 0.3) 50%,
        rgba(44, 24, 16, 0.6) 100%
      );
      z-index: 2;
    }
    .hero-content {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
    }
    .hero-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 0.95;
      color: #FFFFFF;
      margin-bottom: 16px;
      text-shadow: 0 2px 40px rgba(0,0,0,0.25);
    }
    .hero-tagline {
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      margin-bottom: 24px;
    }
    .hero-desc {
      font-size: clamp(0.9rem, 1.2vw, 1.05rem);
      font-weight: 300;
      max-width: 540px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 40px;
      line-height: 1.7;
    }
    .hero-ctas {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }
    .btn-primary {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background-color: var(--terracotta);
      color: #FFF;
      padding: 14px 36px;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
      display: inline-block;
    }
    .btn-primary:hover { background-color: #B3452F; }
    .btn-secondary {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background-color: transparent;
      color: #FFF;
      padding: 14px 36px;
      border: 1px solid rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-block;
    }
    .btn-secondary:hover { background-color: rgba(255,255,255,0.12); }
    .btn-dark {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background-color: var(--wine);
      color: #FFF;
      padding: 14px 36px;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
      display: inline-block;
    }
    .btn-dark:hover { background-color: #5A2C3C; }

    /* ─── Marquee ─── */
    .marquee-bar {
      background-color: var(--wine);
      padding: 20px 0;
      overflow: hidden;
      width: 100%;
    }
    .marquee-track {
      display: flex;
      white-space: nowrap;
      animation: marquee 25s linear infinite;
      will-change: transform;
    }
    .marquee-item {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--cream);
      padding-right: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .marquee-dot {
      color: var(--terracotta);
      margin-left: 48px;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ─── Section shared ─── */
    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background-color: var(--terracotta);
    }

    .animate-in {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .animate-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .animate-in:nth-child(2) { transition-delay: 0.12s; }
    .animate-in:nth-child(3) { transition-delay: 0.24s; }
    .animate-in:nth-child(4) { transition-delay: 0.36s; }
    .animate-in:nth-child(5) { transition-delay: 0.48s; }
    .animate-in:nth-child(6) { transition-delay: 0.60s; }

    /* ─── Our Story ─── */
    #our-story {
      background-color: var(--cream);
      padding: clamp(60px, 8vw, 120px) clamp(1.5rem, 5vw, 4rem);
    }
    .story-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: clamp(40px, 5vw, 80px);
    }
    .story-text { flex: 55; }
    .story-img-col { flex: 45; }
    .story-h2 {
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      line-height: 1.2;
      color: var(--wine);
      margin-bottom: 32px;
    }
    .story-p {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--body);
      margin-bottom: 20px;
    }
    .story-accent { font-weight: 500; color: var(--terracotta); }
    .story-blockquote {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      font-style: italic;
      color: var(--wine);
      border-left: 2px solid var(--terracotta);
      padding-left: 24px;
      line-height: 1.4;
      margin-top: 12px;
    }
    .story-photo {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 8px;
      background-color: #d6ccc2;
    }

    /* ─── Features ─── */
    #features {
      background-color: var(--white);
      padding: clamp(60px, 7vw, 100px) clamp(1.5rem, 5vw, 4rem);
    }
    .features-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }
    .feature-icon { margin-bottom: 16px; }
    .feature-title {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--wine);
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(74, 28, 44, 0.15);
    }
    .feature-desc {
      font-weight: 300;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--body);
    }

    /* ─── Menu ─── */
    #menu {
      background-color: var(--cream);
      padding: clamp(60px, 8vw, 120px) clamp(1.5rem, 5vw, 4rem);
    }
    .menu-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .menu-h2 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.1;
      color: var(--wine);
      text-align: center;
      margin-bottom: 48px;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .menu-card {
      background-color: var(--white);
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .menu-card:hover { transform: translateY(-4px); }
    .menu-card-img-wrap {
      aspect-ratio: 16/9;
      overflow: hidden;
      background-color: #d6ccc2;
    }
    .menu-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .menu-card:hover .menu-card-img { transform: scale(1.04); }
    .menu-card-body { padding: 24px; }
    .menu-card-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      color: var
