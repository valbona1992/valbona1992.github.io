<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #24292e;
            color: white;
            padding: 3rem 0;
        }
        main {
            padding: 3rem 2rem;
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        h2 {
            color: #0366d6;
        }
        p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 1.5rem auto;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 12px 24px;
            background-color: #2ea44f;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>
    <header>
        <h1>Hello, World!</h1>
    </header>
    <main>
        <h2>Welcome to my first GitHub website</h2>
        <p>This is a completely free, live website hosted on GitHub Pages. I built this by pasting a simple block of HTML and CSS into my repository.</p>
        <a href="https://github.com" class="button" target="_blank">Explore GitHub</a>
    </main>
</body>
</html>
